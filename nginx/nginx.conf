user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Connection optimization for high load
    reset_timedout_connection on;
    server_tokens off;
    
    # Buffer settings to prevent memory exhaustion
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate limiting (исключаем локальные запросы от Next.js SSR)
    map $remote_addr $api_limit_key {
        127.0.0.1 "";
        ::1       "";
        default   $binary_remote_addr;
    }
    
    # Увеличенные лимиты для предотвращения ERR_CONNECTION_RESET при частых кликах
    limit_req_zone $api_limit_key zone=api:20m rate=300r/m;
    limit_req_zone $binary_remote_addr zone=comment:20m rate=30r/m;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn_status 503;

    # Upstreams (исправлено для нативного nginx)
    upstream backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    upstream frontend {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name lemanas.ru www.lemanas.ru;
        return 301 https://lemanas.ru$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name lemanas.ru www.lemanas.ru;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/lemanas.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lemanas.ru/privkey.pem;

        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling off;
        ssl_stapling_verify off;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 10M;

        # Блокировка сканеров уязвимостей
        location ~* ^/(wp-admin|wp-login|xmlrpc\.php|administrator|components|modules|plugins|templates|media/system) {
            access_log /var/log/nginx/blocked-scans.log;
            return 403;
        }

        location ~* \.(env|git|sql|bak|old|backup|zip|tar\.gz|config\.php|wp-config)$ {
            access_log /var/log/nginx/blocked-scans.log;
            return 404;
        }

        # Фавикон — точное совпадение
        location = /favicon.ico {
            alias /opt/lm/frontend/public/favicon.ico;
            access_log off;
            log_not_found off;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Content-Type image/x-icon;
        }

        # Next.js static assets
        location ^~ /_next/static/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
        }

        location ^~ /_next/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        # Статические файлы Django
        location /static/ {
            alias /opt/lm/backend/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # Медиа-файлы
        location /media/ {
            alias /opt/lm/backend/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
            try_files $uri =404;
        }

        # Изображения и шрифты из public
        location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|manifest|json|woff2?|ttf|eot|otf)$ {
            alias /opt/lm/frontend/public;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # SEO-файлы
        location = /robots.txt {
            alias /opt/lm/frontend/public/robots.txt;
            access_log off;
            log_not_found off;
            add_header Content-Type text/plain;
        }

        location = /sitemap.html {
            alias /opt/lm/frontend/public/sitemap.html;
            access_log off;
            add_header Content-Type text/html;
        }

        location /sitemap.xml {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Content-Type application/xml;
        }

        # Django Admin
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Django API
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            limit_conn conn_limit 20;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # External redirect — без rate limiting
        location /go/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }

        # Next.js Frontend
        location / {
            limit_conn conn_limit 30;
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }
    }
}